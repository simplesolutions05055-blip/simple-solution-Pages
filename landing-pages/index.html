<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Simple Solutions — Landing Pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Heebo',sans-serif;
    background:#0F1738;
    color:#FBF7EE;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .box{
    max-width:560px;
    text-align:center;
  }
  .logo{
    font-size:14px;
    letter-spacing:0.3em;
    color:#3DDED2;
    margin-bottom:24px;
    font-weight:700;
  }
  h1{
    font-size:clamp(28px,5vw,44px);
    font-weight:900;
    line-height:1.15;
    margin-bottom:16px;
  }
  p{
    font-size:18px;
    opacity:0.7;
    line-height:1.6;
  }
  a{
    color:#3DDED2;
    text-decoration:none;
    font-weight:700;
    border-bottom:1px solid currentColor;
  }
  a:hover{opacity:0.8}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">SIMPLE SOLUTIONS</div>
    <h1>דפי נחיתה</h1>
    <p>זה דומיין פנימי של דפי נחיתה לקמפיינים וללקוחות.<br>
    אם הגעת לכאן בטעות, חזור ל-<a href="https://www.simple-solution.co.il">אתר הראשי</a>.</p>
  </div>
</body>
</html>
